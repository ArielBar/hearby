name: Deploy Hearby

on:
  push:
    branches:
      - main

env:
  REGISTRY_IMAGE: ghcr.io/arielbar/hearby-api

permissions:
  contents: read
  packages: write

jobs:
  lint-and-test:
    name: Lint & Test (Affected)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # שימוש ב-install במקום ci מונע את שגיאות ה-lock file שנתקענו בהן קודם
      - run: npm install --no-audit --no-fund

      - uses: nrwl/nx-set-shas@v4

      - run: npx nx affected:lint
      - run: npx nx affected:test

  build-and-push:
    name: Build & Push Backend Image
    runs-on: ubuntu-latest
    needs: lint-and-test
    outputs:
      api-affected: ${{ steps.check.outputs.affected }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm install --no-audit --no-fund

      - uses: nrwl/nx-set-shas@v4

      - name: Check if api is affected
        id: check
        run: |
          set -x
          npx nx show projects --affected | tee /tmp/affected.txt
          if grep -q "^api$" /tmp/affected.txt; then
            echo "affected=true" >> "$GITHUB_OUTPUT"
          else
            echo "affected=false" >> "$GITHUB_OUTPUT"
          fi
          cat "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        if: steps.check.outputs.affected == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # מריץ את ה-Build של ה-NestJS דרך Nx כדי שתיקיית ה-dist תיווצר בשורש לפני ה-Docker
      - name: Build API via Nx
        if: steps.check.outputs.affected == 'true'
        run: npx nx build api --prod

      - name: Build and push Docker image
        if: steps.check.outputs.affected == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/production.Dockerfile
          push: true
          tags: ghcr.io/arielbar/hearby-api:latest

  deploy:
    name: Deploy to Hetzner
    runs-on: ubuntu-latest
    needs: build-and-push
    if: needs.build-and-push.outputs.api-affected == 'true'
    steps:
      - name: Deploy to Hetzner via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: 'root'
          password: ${{ secrets.HETZNER_PASSWORD }}
          script: |
            cd ~/hearby-backend
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
